# =============================================================================
# Equipment Configuration - 24W CCTV Power Supply
# =============================================================================
# All equipment-specific knowledge. NO hard-coded logic in code.
# =============================================================================

metadata:
  equipment_id: "cctv-psu-24w-v1"
  name: "24W CCTV Power Supply Unit"
  category: "power_supply"
  manufacturer: "Generic CCTV"
  version: "1.0.0"
  created: "2026-02-03"

# =============================================================================
# SIGNALS - All measurable signals
# =============================================================================
signals:
  # Input signals
  - signal_id: "ac_input"
    name: "AC Input Voltage"
    test_point: "AC_IN"
    parameter: "voltage_rms"
    unit: "V"
    measurability: "external"
    physical_description: "Top-left corner of PCB, large blue two-position screw terminal connector with AC LINE and NEUTRAL markings"
    component_type: "capacitor"
    image_url: "http://localhost:8000/cctv-psu-24w-v1-test-points/ac_input_capacitor.png"
    diagnostic_meaning: "Confirms AC power is present at input. Zero reading indicates no AC power from wall or power cord issue."
    expected_behavior: "170-265V AC (typical mains range)"
    related_tests: []
    pro_tips:
      - "Use caution - this point carries mains voltage up to 265V AC"
      - "Set multimeter to AC voltage mode before connecting"
      - "If reading 0V, check power cord and switch first"

  # Primary side
  - signal_id: "bridge_output"
    name: "Bridge Rectifier Output"
    test_point: "TP1"
    parameter: "voltage_dc"
    unit: "V"
    measurability: "internal"
    physical_description: "Upper-right corner of PCB, near the four diodes in a black rectangular package (BR1). Look for the large electrolytic capacitor nearby."
    component_type: "bridge_rectifier"
    image_url: "http://localhost:8000/cctv-psu-24w-v1-test-points/bridge_rectifier_diode.png"
    diagnostic_meaning: "Confirms AC to DC conversion stage. Failure indicates bridge diode issue. Zero or low reading with AC present suggests failed diodes."
    expected_behavior: "280-380V DC under load (peak of AC input minus diode drops)"
    related_tests:
      - "forward_bias_test"
      - "reverse_bias_test"
    pro_tips:
      - "This point can read up to 380V DC - use extreme caution"
      - "If reading negative, swap your multimeter probes"
      - "A healthy reading here confirms the primary side is working"

  - signal_id: "input_fuse"
    name: "Input Fuse"
    test_point: "F1"
    parameter: "resistance"
    unit: "Ω"
    measurability: "internal"
    physical_description: "Near the AC input connector, white cylindrical component with metal end caps. May have visible fuse symbol printed on PCB."
    component_type: "fuse"
    image_url: "http://localhost:8000/cctv-psu-24w-v1-test-points/fuse_test_point.png"
    diagnostic_meaning: "Primary protection device. If open, indicates downstream short in bridge, capacitor, or primary circuitry. Check for shorts before replacing."
    expected_behavior: "<0.1Ω (continuity) when good"
    related_tests: []
    pro_tips:
      - "This fuse is a 250V 1A slow-blow type"
      - "If open, check BR1 and C1 before replacing - there may be a downstream short"
      - "Use resistance mode with power OFF to test"

  # Secondary/Output
  - signal_id: "output_12v"
    name: "12V Output Rail"
    test_point: "TP2"
    parameter: "voltage_dc"
    unit: "V"
    measurability: "internal"
    physical_description: "Bottom-right area of PCB, look for the large output capacitor (C12, 1000μF 16V) with a small test point nearby marked TP2"
    component_type: "capacitor"
    image_url: "http://localhost:8000/cctv-psu-24w-v1-test-points/main_capacitor_test_point.png"
    diagnostic_meaning: "Main output voltage. Failure here indicates regulation or primary side failure. Check U5, R2 feedback, and secondary components."
    expected_behavior: "11.4-12.6V DC under no-load; 10.8-13.2V under load"
    related_tests: []
    pro_tips:
      - "This is the main output - check here first for no-output faults"
      - "Load the supply with 12V 1A bulb or resistor to test under load"
      - "Reading should be 11.4V-12.6V under no-load conditions"

  - signal_id: "feedback_ref"
    name: "Feedback Reference"
    test_point: "TP3"
    parameter: "voltage_dc"
    unit: "V"
    measurability: "internal"
    physical_description: "Center-left of PCB, near U5 (the black IC with 8 pins). Small test point marked TP3 close to the feedback voltage divider."
    component_type: "resistor"
    image_url: "http://localhost:8000/cctv-psu-24w-v1-test-points/resistor_1.png"
    diagnostic_meaning: "Precision 2.5V reference for output regulation. If this is wrong, output voltage will be wrong. Check R2 feedback resistor."
    expected_behavior: "2.4-2.6V DC (precision reference)"
    related_tests: []
    pro_tips:
      - "This is the precision 2.5V reference for output regulation"
      - "If this is wrong, output voltage will be wrong"
      - "Check R2 (470Ω resistor) if this voltage is off"

  - signal_id: "output_current"
    name: "Output Current"
    test_point: "I_OUT"
    parameter: "current"
    unit: "A"
    measurability: "internal"
    physical_description: "Near the output connector, look for a small resistor (typically 0.1Ω-0.5Ω) in series with the positive output rail"
    component_type: "resistor"
    image_url: "http://localhost:8000/cctv-psu-24w-v1-test-points/resistor_1.png"
    diagnostic_meaning: "Monitors load current for overcurrent protection. High current indicates output short or overload condition."
    expected_behavior: "0-2.0A normal; 2.0-2.5A overload; >2.5A overcurrent (protection)"
    related_tests: []
    pro_tips:
      - "Use current measurement or measure voltage drop across sense resistor"
      - "Divide the voltage drop by the resistor value to get current"
      - "Overcurrent protection triggers around 2.0A-2.5A"

  - signal_id: "feedback_resistor"
    name: "Feedback Resistor"
    test_point: "R2"
    parameter: "resistance"
    unit: "Ω"
    measurability: "internal"
    physical_description: "Center area of PCB, small beige or blue rectangular component marked R2. Usually a 470Ω 1% metal film resistor."
    component_type: "resistor"
    image_url: "http://localhost:8000/cctv-psu-24w-v1-test-points/resistor_1.png"
    diagnostic_meaning: "Sets output voltage via feedback loop. If open, output goes high. If shorted, output drops to near zero."
    expected_behavior: "465-475Ω (470Ω ±1%)"
    related_tests: []
    pro_tips:
      - "This resistor sets the output voltage - if open, output goes high"
      - "If shorted, output voltage will drop to near zero"
      - "Check this if you have overvoltage or no-output conditions"

  - signal_id: "output_capacitor_esr"
    name: "Output Capacitor ESR"
    test_point: "C12"
    parameter: "resistance"
    unit: "Ω"
    measurability: "internal"
    physical_description: "Bottom-right of PCB, the large electrolytic capacitor (1000μF 16V). Marked C12 on PCB silkscreen."
    component_type: "capacitor"
    image_url: "http://localhost:8000/cctv-psu-24w-v1-test-points/main_capacitor_test_point.png"
    diagnostic_meaning: "Filter capacitor health indicator. High ESR causes output ripple, voltage droop under load, and can trigger thermal issues."
    expected_behavior: "<0.2Ω normal; 0.2-0.5Ω degraded; >0.5Ω failed"
    related_tests: []
    pro_tips:
      - "High ESR causes output ripple and voltage droop under load"
      - "Use an ESR meter for accurate readings - multimeter won't work"
      - "Replace with low-ESR capacitor if reading above 0.5Ω"

  # Thermal
  - signal_id: "u5_temperature"
    name: "U5 Case Temperature"
    test_point: "U5"
    parameter: "temperature"
    unit: "°C"
    measurability: "internal"
    physical_description: "Center-right of PCB, black 8-pin IC in rectangular package. This is the buck converter controller IC."
    component_type: "mosfet"
    image_url: "http://localhost:8000/cctv-psu-24w-v1-test-points/mosfet_transistor.png"
    diagnostic_meaning: "Buck converter switching element temperature. High temperature indicates overload, poor heatsinking, or component degradation."
    expected_behavior: "40-60°C normal under light load; 60-80°C elevated; >80°C warning; >95°C critical"
    related_tests: []
    pro_tips:
      - "Normal operating temperature is 40-60°C under light load"
      - "Above 80°C indicates thermal issues or overload"
      - "Use an infrared thermometer or thermal camera for accurate readings"

# =============================================================================
# THRESHOLDS - Semantic states and numerical boundaries
# =============================================================================
thresholds:
  # AC Input
  - signal_id: "ac_input"
    states:
      normal: { min: 170, max: 265 }
      degraded: { min: 150, max: 285 }
      under_voltage: { max: 150 }
      over_voltage: { min: 285 }
      missing: { max: 10 }

  # Bridge Output
  - signal_id: "bridge_output"
    states:
      normal: { min: 280, max: 380 }
      degraded: { min: 250, max: 400 }
      low: { max: 250 }
      missing: { max: 10 }

  # 12V Output
  - signal_id: "output_12v"
    states:
      normal: { min: 11.4, max: 12.6 }
      degraded: { min: 10.8, max: 13.2 }
      under_voltage: { max: 10.8 }
      over_voltage: { min: 13.2 }
      missing: { max: 0.5 }

  # Feedback Reference
  - signal_id: "feedback_ref"
    states:
      normal: { min: 2.4, max: 2.6 }
      degraded: { min: 2.2, max: 2.8 }
      failed: { max: 0.2 }
      over: { min: 2.8 }

  # Output Current
  - signal_id: "output_current"
    states:
      normal: { min: 0, max: 2.0 }
      overload: { min: 2.0, max: 2.5 }
      over_current: { min: 2.5 }
      shorted: { max: 0.01 }

  # Feedback Resistor
  - signal_id: "feedback_resistor"
    states:
      normal: { min: 465, max: 475 }
      degraded: { min: 450, max: 490 }
      open: { min: 100000 }
      shorted: { max: 10 }

  # Output Capacitor ESR
  - signal_id: "output_capacitor_esr"
    states:
      normal: { max: 0.2 }
      degraded: { max: 0.5 }
      failed: { min: 0.5 }

  # Temperature
  - signal_id: "u5_temperature"
    states:
      normal: { max: 60 }
      elevated: { max: 80 }
      warning: { max: 95 }
      critical: { min: 95 }

# =============================================================================
# FAULTS - All faults, signatures, and recovery actions
# =============================================================================
faults:
  # Fault: Output Rail Collapse
  - fault_id: "output_rail_collapse"
    name: "Output Rail Collapse"
    description: "12V output has collapsed to near zero"
    priority: 1  # Highest priority - most common failure
    signatures:
      - signal_id: "output_12v"
        state: "missing"
        confidence: 0.9
      - signal_id: "feedback_ref"
        state: "failed"
        confidence: 0.6
    hypotheses:
      - rank: 1
        component: "U5"
        failure_mode: "failed"
        cause: "Buck converter IC has failed"
        confidence: 0.85
      - rank: 2
        component: "BR1"
        failure_mode: "failed"
        cause: "Bridge rectifier has failed"
        confidence: 0.10
    recovery:
      - step: 1
        action: "inspect"
        target: "Input fuse F1"
        instruction: "Check fuse continuity"
        verification: "Fuse reads <0.1Ω"
        safety: "Disconnect AC power before inspection"
      - step: 2
        action: "measure"
        target: "Bridge output TP1"
        instruction: "Measure DC voltage at bridge output"
        verification: "Should read 280-380V DC"
      - step: 3
        action: "replace"
        target: "U5"
        instruction: "Replace buck converter IC"
        verification: "Output returns to 12V ±5%"
        estimated_time: "15 minutes"
        difficulty: "moderate"
        tools: ["Soldering iron", "Thermal paste"]

  # Fault: Overvoltage Output
  - fault_id: "overvoltage_output"
    name: "Overvoltage Output"
    description: "12V output exceeds safe maximum"
    priority: 4
    signatures:
      - signal_id: "output_12v"
        state: "over_voltage"
        confidence: 0.95
    hypotheses:
      - rank: 1
        component: "R2"
        failure_mode: "open"
        cause: "Feedback resistor R2 has failed open"
        confidence: 0.92
    recovery:
      - step: 1
        action: "measure"
        target: "Feedback reference TP3"
        instruction: "Measure reference voltage"
        verification: "Should read 2.5V ±0.1V"
      - step: 2
        action: "measure"
        target: "Feedback resistor R2"
        instruction: "Measure R2 resistance"
        verification: "Should read 470Ω ±1%"
      - step: 3
        action: "replace"
        target: "R2"
        instruction: "Replace with 470Ω ±1% resistor"
        verification: "Output returns to 12V ±5%"

  # Fault: Thermal Shutdown
  - fault_id: "thermal_shutdown"
    name: "Thermal Shutdown"
    description: "Unit shuts down after operating for several minutes"
    priority: 5
    signatures:
      - signal_id: "u5_temperature"
        state: "critical"
        confidence: 0.9
      - signal_id: "output_12v"
        state: "missing"
        confidence: 0.7
    hypotheses:
      - rank: 1
        component: "U5"
        failure_mode: "overheating"
        cause: "Inadequate heatsinking on buck converter"
        confidence: 0.87
    recovery:
      - step: 1
        action: "measure"
        target: "U5 temperature"
        instruction: "Monitor temperature during operation"
      - step: 2
        action: "inspect"
        target: "Heatsink"
        instruction: "Check heatsink attachment and thermal compound"
      - step: 3
        action: "improve"
        target: "Thermal management"
        instruction: "Add/replace heatsink or improve airflow"
        verification: "Temperature stays below 70°C at full load"

  # Fault: Excessive Ripple
  - fault_id: "excessive_ripple"
    name: "Excessive Output Ripple"
    description: "Output voltage ripple exceeds specification"
    priority: 3
    signatures:
      - signal_id: "output_12v"
        state: "degraded"
        confidence: 0.8
      - signal_id: "output_capacitor_esr"
        state: "failed"
        confidence: 0.9
    hypotheses:
      - rank: 1
        component: "C12"
        failure_mode: "degraded"
        cause: "Output capacitor has high ESR"
        confidence: 0.90
    recovery:
      - step: 1
        action: "measure"
        target: "C12 ESR"
        instruction: "Measure capacitor ESR"
        verification: "Should be <0.2Ω"
      - step: 2
        action: "replace"
        target: "C12"
        instruction: "Replace with low-ESR 1000μF 16V capacitor"
        verification: "Ripple <50mV p-p"

  # Fault: Primary Side Failure
  - fault_id: "primary_side_failure"
    name: "Primary Side Input Fault"
    description: "AC input not reaching primary side circuits"
    priority: 2
    signatures:
      - signal_id: "ac_input"
        state: "normal"
        confidence: 0.9
      - signal_id: "bridge_output"
        state: "low"
        confidence: 0.95
    hypotheses:
      - rank: 1
        component: "F1"
        failure_mode: "open"
        cause: "Input fuse has failed"
        confidence: 0.88
    recovery:
      - step: 1
        action: "inspect"
        target: "Input fuse F1"
        instruction: "Visual inspection of fuse"
      - step: 2
        action: "measure"
        target: "F1 resistance"
        instruction: "Measure fuse continuity"
        verification: "Should read <0.1Ω"
      - step: 3
        action: "replace"
        target: "F1"
        instruction: "Replace with 250V 1A slow-blow fuse"
        verification: "Primary side voltage returns"

# =============================================================================
# TROUBLESHOOTING STRATEGIES
# =============================================================================
strategies:
  default: "protection_first"
  available:
    - id: "protection_first"
      name: "Protection-First Reasoning"
      description: "Check protection circuits first"
      priority_order:
        - "Check for obvious protection triggers"
        - "Verify input power integrity"
        - "Check output short conditions"
        - "Isolate failure to primary/secondary"
    - id: "energy_flow"
      name: "Energy Flow Tracing"
      description: "Trace power from input to output"
      priority_order:
        - "Verify AC input"
        - "Check primary conversion"
        - "Verify regulation"
        - "Check output stage"
    - id: "binary_partition"
      name: "Binary Partition"
      description: "Divide system in half, test each half"
    - id: "information_gain"
      name: "Information Gain"
      description: "Order tests by information gain"
  active: "protection_first"

# =============================================================================
# IMAGES
# =============================================================================
images:
  - image_id: "pcb_overview"
    filename: "docs/CCTV Power Supply Unit.jpg"
    description: "Full PCB layout overview"
    test_points: ["AC_IN", "TP1", "TP2", "TP3", "F1", "U5", "R2", "C12"]
    annotations:
      - target: "AC_IN"
        position: "top-left corner"
        label: "AC Input Connector"
      - target: "U5"
        position: "center-right"
        label: "Buck Converter IC"

  - image_id: "test_point_tp2"
    filename: "docs/CCTV Power Supply Unit.jpg"
    description: "Close-up of TP2 (12V output)"
    test_points: ["TP2"]

# =============================================================================
# RECOVERY PROTOCOLS
# =============================================================================
recovery_protocols:
  - protocol_id: "power_cycle"
    name: "Safe Power Cycle"
    steps:
      - step: 1
        action: "disconnect"
        instruction: "Disconnect AC power from unit"
        wait_seconds: 30
        safety: "Verify power LED is off"
      - step: 2
        action: "inspect"
        instruction: "Check for visible damage or burning"
      - step: 3
        action: "connect"
        instruction: "Reconnect AC power"
      - step: 4
        action: "measure"
        instruction: "Verify output voltage"
        expected: "12V ±5%"
